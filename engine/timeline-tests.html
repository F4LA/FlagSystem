<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flag System Engine — Timeline Tests (Step 3b)</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f7f7f7; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    button { background: #1f6feb; color: white; border: 0; padding: 0.6rem 1.2rem; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1858c4; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; line-height: 1.4; max-height: 70vh; overflow-y: auto; white-space: pre-wrap; }
    .status { margin: 1rem 0; font-weight: 600; }
    .pass { color: #2ea043; }
    .fail { color: #cf222e; }
  </style>
</head>
<body>
  <h1>Flag System Engine — Timeline Tests (Step 3b)</h1>
  <div class="meta">Tests for <code>client-timeline.js</code>. Depends on <code>coaching-week.js</code>.</div>

  <button id="run">Run tests</button>
  <div id="status" class="status"></div>
  <pre id="output">Press "Run tests" to execute the suite.</pre>

  <!-- Load modules in order. UMD style: each attaches a global. -->
  <script src="./coaching-week.js"></script>
  <script src="./client-timeline.js"></script>
  <script src="./timeline-tests.js"></script>

  <script>
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    document.getElementById('run').addEventListener('click', function () {
      const origLog = console.log;
      const origErr = console.error;
      let buffer = '';
      console.log   = function () { buffer += Array.from(arguments).join(' ') + '\n'; origLog.apply(console, arguments); };
      console.error = function () { buffer += Array.from(arguments).join(' ') + '\n'; origErr.apply(console, arguments); };

      let result;
      try {
        result = window.TimelineTests.runTimelineTests();
      } catch (e) {
        buffer += '\nFATAL: ' + e.message + '\n' + (e.stack || '');
      }

      console.log = origLog;
      console.error = origErr;

      output.textContent = buffer;

      if (result) {
        if (result.failed === 0) {
          status.innerHTML = '<span class="pass">✓ All ' + result.passed + ' tests passed</span>';
        } else {
          status.innerHTML = '<span class="fail">✗ ' + result.failed + ' of ' + (result.passed + result.failed) + ' tests failed</span>';
        }
      }
    });
  </script>
</body>
</html>
