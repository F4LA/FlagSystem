<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag System Dashboard — Strong Standard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="top-bar">
    <div class="brand">
      <span class="brand-mark">STRONG STANDARD</span>
      <span class="brand-sub">Flag System Dashboard</span>
    </div>
    <div class="top-bar-right">
      <span class="refresh-meta" id="refresh-meta">Loading…</span>
      <button class="btn btn-secondary" id="refresh-btn" type="button">
        <span class="btn-icon">↻</span>
        <span>Refresh</span>
      </button>
    </div>
  </header>

  <nav class="tab-nav" id="tab-nav">
    <button class="tab-btn is-active" data-tab="queue" type="button">Friday Action Queue</button>
    <button class="tab-btn" data-tab="roster" type="button">Client Roster</button>
    <button class="tab-btn" data-tab="patterns" type="button">Coach Patterns</button>
    <button class="tab-btn" data-tab="black" type="button">Black Flagged Clients</button>
  </nav>

  <main class="main" id="main">

    <section class="tab-panel is-active" id="panel-queue" aria-labelledby="tab-queue">
      <div class="loading-state" id="queue-loading">
        <div class="spinner"></div>
        <p>Loading client data…</p>
      </div>
      <div class="error-state hidden" id="queue-error">
        <h2>Could not load data</h2>
        <p id="queue-error-message"></p>
        <button class="btn btn-secondary" type="button" onclick="window.location.reload()">Try again</button>
      </div>
      <div class="queue-content hidden" id="queue-content"></div>
    </section>

    <section class="tab-panel" id="panel-roster">
      <div class="placeholder">
        <h2>Client Roster</h2>
        <p>Coming in v1.1</p>
      </div>
    </section>

    <section class="tab-panel" id="panel-patterns">
      <div class="placeholder">
        <h2>Coach Patterns</h2>
        <p>Coming in v1.1</p>
      </div>
    </section>

    <section class="tab-panel" id="panel-black">
      <div class="placeholder">
        <h2>Black Flagged Clients</h2>
        <p>Coming in v1.1</p>
      </div>
    </section>

  </main>

  <!-- Slack modal -->
  <div class="modal-backdrop hidden" id="slack-modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-header">
        <h2 id="modal-title">Generate Slack Message</h2>
        <button class="modal-close" type="button" id="modal-close" aria-label="Close">×</button>
      </header>
      <div class="modal-body">
        <p class="modal-meta" id="modal-meta"></p>
        <textarea class="modal-textarea" id="modal-textarea" rows="10" spellcheck="false"></textarea>
      </div>
      <footer class="modal-footer">
        <button class="btn btn-secondary" type="button" id="modal-copy">
          <span class="btn-icon">⧉</span>
          <span id="modal-copy-label">Copy</span>
        </button>
        <button class="btn btn-primary" type="button" id="modal-mark-sent">Mark sent →</button>
      </footer>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Engine (load order matters: UMD modules with browser globals) -->
  <script src="engine/coaching-week.js"></script>
  <script src="engine/client-timeline.js"></script>
  <script src="engine/consecutive-evaluable.js"></script>
  <script src="engine/pathway-evaluators.js"></script>
  <script src="engine/color-deriver.js"></script>
  <script src="engine/pathway-engine.js"></script>

  <!-- Dashboard modules -->
  <script src="dashboard/config.js"></script>
  <script src="dashboard/sheets-reader.js"></script>
  <script src="dashboard/state-builder.js"></script>
  <script src="dashboard/slack-templates.js"></script>
  <script src="dashboard/queue-builder.js"></script>
  <script src="dashboard/actions-writer.js"></script>
  <script src="dashboard/tab1.js"></script>
  <script src="app.js"></script>

</body>
</html>
